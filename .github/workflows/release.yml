name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build
        run: bun run build

      - name: Rename binary
        run: mv dist/index.js dist/esperta-base-darwin

      - name: Generate checksum
        run: shasum -a 256 dist/esperta-base-darwin > dist/esperta-base-darwin.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esperta-base-darwin
          path: |
            dist/esperta-base-darwin
            dist/esperta-base-darwin.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/esperta-base-darwin
            artifacts/esperta-base-darwin.sha256

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: bun run scripts/update-homebrew.ts
